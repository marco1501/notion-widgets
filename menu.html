<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Roboto:wght@400;700&family=Playfair+Display:wght@700&family=Montserrat:wght@400;700&family=Inter:wght@400;700&family=Open+Sans&family=Ubuntu:wght@400;700&family=Lora&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 10px;
            background-color: transparent;
            transition: background 0.3s;
            overflow-x: hidden;
        }

        .nav-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        @media (max-width: 600px) {
            .nav-container { flex-direction: column; }
        }

        .nav-item {
            text-decoration: none;
            padding: 10px 20px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item:hover { opacity: 0.7; transform: translateY(-1px); }

        /* Modern Black & White Toggle */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #e0e0e0;
            transition: .3s;
            border-radius: 22px;
            border: 1px solid #000;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: #000;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #000; }
        input:checked + .slider:before { transform: translateX(22px); background-color: #fff; }

        /* Settings Panel */
        #settings-overlay {
            display: none;
            margin-top: 20px;
            padding: 25px;
            border-radius: 15px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid #000;
            font-family: 'Inter', sans-serif;
            color: #000;
        }

        .setting-group { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }

        /* Runde Farbwähler */
        input[type="color"] {
            -webkit-appearance: none; border: none; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; background: none; padding: 0;
        }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #000; border-radius: 50%; }

        input[type="range"] { width: 120px; accent-color: #000; }

        select, input[type="text"], input[type="number"], input[type="url"] {
            padding: 8px; border-radius: 6px; border: 1px solid #000; background: #fff;
        }

        .manage-item {
            display: flex; justify-content: space-between; background: #f9f9f9; 
            padding: 5px 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #eee;
        }

        .footer-settings {
            margin-top: 20px; text-align: center; font-size: 11px; padding-top: 10px; border-top: 1px solid #eee;
        }
        .footer-settings a { color: #000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="nav-wrapper" class="nav-container"></div>

    <div id="settings-overlay">
        <h2 style="margin-top:0">Widget Customizer</h2>
        
        <div class="setting-group">
            <div class="setting-row">
                <label>Fett-Schrift</label>
                <label class="switch"><input type="checkbox" id="bold-toggle" onchange="saveAndRender()"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <label>Transparentes Widget</label>
                <label class="switch"><input type="checkbox" id="bg-trans-toggle" onchange="saveAndRender()"><span class="slider"></span></label>
            </div>
            <div class="setting-row">
                <label>Button Form</label>
                <select id="shape-select" onchange="saveAndRender()">
                    <option value="0px">Eckig</option>
                    <option value="8px">Leicht abgerundet</option>
                    <option value="15px">Stark abgerundet</option>
                    <option value="50px">Rund (Pille)</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Button Transparenz</label>
                <input type="range" id="btn-opacity" min="0.1" max="1" step="0.1" onchange="saveAndRender()">
            </div>
        </div>

        <div class="setting-group">
            <div class="setting-row"><span>Textfarbe</span><input type="color" id="color-text" onchange="saveAndRender()"></div>
            <div class="setting-row"><span>Buttonfarbe</span><input type="color" id="color-btn" onchange="saveAndRender()"></div>
            <div class="setting-row"><span>Widget-HG</span><input type="color" id="color-bg" onchange="saveAndRender()"></div>
        </div>

        <div class="setting-group">
            <div class="setting-row">
                <label>Schriftart</label>
                <select id="font-select" onchange="saveAndRender()">
                    <option value="'Segoe UI', sans-serif">Segoe UI</option>
                    <option value="'Rubik Mono One', sans-serif">Rubik Mono One</option>
                    <option value="'Inter', sans-serif">Inter</option>
                    <option value="'Montserrat', sans-serif">Montserrat</option>
                    <option value="'Roboto', sans-serif">Roboto</option>
                    <option value="'Playfair Display', serif">Playfair Display</option>
                    <option value="'Ubuntu', sans-serif">Ubuntu</option>
                    <option value="'Lora', serif">Lora</option>
                    <option value="'Fira Code', monospace">Fira Code</option>
                    <option value="'Open Sans', sans-serif">Open Sans</option>
                </select>
            </div>
            <div class="setting-row">
                <label>Größe (px)</label>
                <input type="number" id="size-input" onchange="saveAndRender()">
            </div>
        </div>

        <div class="setting-group">
            <strong>Link hinzufügen</strong>
            <div class="setting-row">
                <input type="text" id="new-name" placeholder="Name" style="width:40%">
                <input type="url" id="new-url" placeholder="URL" style="width:40%">
                <button onclick="addLink()" style="cursor:pointer; padding:8px;">+</button>
            </div>
            <div id="manage-links" style="max-height: 150px; overflow-y: auto; margin-top:10px;"></div>
        </div>

        <button onclick="toggleSettings()" style="width:100%; margin-top:15px; cursor:pointer; padding:12px; background:#000; color:#fff; border:none; border-radius:8px; font-weight:bold;">Einstellungen schließen</button>

        <div class="footer-settings">
            made by <a href="https://www.marcofoerster.com" target="_blank">Marco Förster</a>
        </div>
    </div>

    <script>
        let config = {
            font: "'Segoe UI', sans-serif",
            fontSize: 14,
            isBold: false,
            textColor: '#000000',
            btnColor: '#ffffff',
            bgColor: '#ffffff',
            bgTransparent: true,
            borderRadius: '8px',
            btnOpacity: 1,
            links: [
                { name: "Alltag & Organisation", url: "https://www.notion.so/2ffa11438f5b80cfbdaad999da822115?pvs=25" },
                { name: "Körper & Geist", url: "https://www.notion.so/302a11438f5b80dfbef5e86fac7a48f0?pvs=25" },
                { name: "Beziehung", url: "https://www.notion.so/3046a4e7d2fc80e6adcccaa012804a2e?pvs=25" },
                { name: "Arbeit", url: "https://www.notion.so/2ffa11438f5b80f19383ef8ce6e26a43?pvs=25" },
                { name: "Selbständigkeit", url: "https://www.notion.so/2ffa11438f5b8029b771f04b68f9536c?pvs=25" }
            ]
        };

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
            return `${r}, ${g}, ${b}`;
        }

        function init() {
            const saved = localStorage.getItem('notion-nav-master');
            if (saved) config = JSON.parse(saved);
            
            document.getElementById('font-select').value = config.font;
            document.getElementById('size-input').value = config.fontSize;
            document.getElementById('bold-toggle').checked = config.isBold;
            document.getElementById('color-text').value = config.textColor;
            document.getElementById('color-btn').value = config.btnColor;
            document.getElementById('color-bg').value = config.bgColor;
            document.getElementById('bg-trans-toggle').checked = config.bgTransparent;
            document.getElementById('shape-select').value = config.borderRadius;
            document.getElementById('btn-opacity').value = config.btnOpacity;
            
            renderMenu();
        }

        function renderMenu() {
            const wrapper = document.getElementById('nav-wrapper');
            const manager = document.getElementById('manage-links');
            wrapper.innerHTML = '';
            manager.innerHTML = '';

            document.body.style.fontFamily = config.font;
            document.body.style.fontSize = config.fontSize + 'px';
            document.body.style.fontWeight = config.isBold ? 'bold' : 'normal';
            document.body.style.backgroundColor = config.bgTransparent ? 'transparent' : config.bgColor;

            const rgbBtn = hexToRgb(config.btnColor);

            config.links.forEach((link, index) => {
                // Main Menu
                const a = document.createElement('a');
                a.href = link.url; a.target = "_blank"; a.className = 'nav-item';
                a.innerText = link.name;
                a.style.backgroundColor = `rgba(${rgbBtn}, ${config.btnOpacity})`;
                a.style.color = config.textColor;
                a.style.borderRadius = config.borderRadius;
                wrapper.appendChild(a);

                // Settings Manager List
                const item = document.createElement('div');
                item.className = 'manage-item';
                item.innerHTML = `<span>${link.name}</span> <button onclick="removeLink(${index})" style="border:none; background:none; cursor:pointer; color:red; font-weight:bold;">X</button>`;
                manager.appendChild(item);
            });

            const setBtn = document.createElement('div');
            setBtn.className = 'nav-item'; setBtn.innerHTML = '⚙️';
            setBtn.style.backgroundColor = `rgba(${rgbBtn}, ${config.btnOpacity})`;
            setBtn.style.color = config.textColor;
            setBtn.style.borderRadius = config.borderRadius;
            setBtn.onclick = toggleSettings;
            wrapper.appendChild(setBtn);
        }

        function saveAndRender() {
            config.font = document.getElementById('font-select').value;
            config.fontSize = document.getElementById('size-input').value;
            config.isBold = document.getElementById('bold-toggle').checked;
            config.textColor = document.getElementById('color-text').value;
            config.btnColor = document.getElementById('color-btn').value;
            config.bgColor = document.getElementById('color-bg').value;
            config.bgTransparent = document.getElementById('bg-trans-toggle').checked;
            config.borderRadius = document.getElementById('shape-select').value;
            config.btnOpacity = document.getElementById('btn-opacity').value;

            localStorage.setItem('notion-nav-master', JSON.stringify(config));
            renderMenu();
        }

        function addLink() {
            const name = document.getElementById('new-name').value;
            const url = document.getElementById('new-url').value;
            if(name && url) {
                config.links.push({name, url});
                document.getElementById('new-name').value = '';
                document.getElementById('new-url').value = '';
                saveAndRender();
            }
        }

        function removeLink(index) {
            config.links.splice(index, 1);
            saveAndRender();
        }

        function toggleSettings() {
            const el = document.getElementById('settings-overlay');
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        init();
    </script>
</body>
</html>
