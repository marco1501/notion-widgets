<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Kalender</title>

<style>
:root {
  --bg: #ffffff;
  --text: #000000;
  --header-bg: #8EA39D;
  --cell-hover: #e6e6e6;
}

body.dark {
  --bg: #1e1e1e;
  --text: #ffffff;
  --cell-hover: #333333;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  padding: 10px;
  transition: 0.3s ease;
}

.calendar-container {
  max-width: 320px;
  margin: auto;
  border-radius: 12px;
}

.header {
  background: var(--header-bg);
  padding: 10px;
  border-radius: 12px 12px 0 0;
  font-weight: bold;
  color: #fff;
}

table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 5px;
}

th {
  font-size: 12px;
  padding: 5px 0;
}

td {
  height: 35px;
  width: 14%;
  border-radius: 8px;
  transition: 0.2s;
}

td:hover {
  background: var(--cell-hover);
  cursor: default;
}

.today {
  background: #000;
  color: #fff;
  border-radius: 8px;
}

body.dark .today {
  background: #fff;
  color: #000;
}

.switch {
  margin-top: 10px;
  cursor: pointer;
  padding: 6px 12px;
  border-radius: 20px;
  border: 1px solid var(--text);
  background: transparent;
  color: var(--text);
}
</style>
</head>

<body>

<div class="calendar-container">
  <div class="header" id="monthYear"></div>

  <table>
    <thead>
      <tr>
        <th>Mo</th><th>Di</th><th>Mi</th>
        <th>Do</th><th>Fr</th><th>Sa</th><th>So</th>
      </tr>
    </thead>
    <tbody id="calendarBody"></tbody>
  </table>

  <button class="switch" onclick="toggleMode()">Dark / Light</button>
</div>

<script>
const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

document.getElementById("monthYear").innerText =
  today.toLocaleString("de-DE", { month: "long", year: "numeric" });

const firstDay = new Date(year, month, 1);
const lastDate = new Date(year, month + 1, 0).getDate();
let startDay = (firstDay.getDay() + 6) % 7;

let calendar = "";
let date = 1;

for (let i = 0; i < 6; i++) {
  calendar += "<tr>";
  for (let j = 0; j < 7; j++) {
    if (i === 0 && j < startDay) {
      calendar += "<td></td>";
    } else if (date > lastDate) {
      calendar += "<td></td>";
    } else {
      const isToday = date === today.getDate() ? "today" : "";
      calendar += `<td class="${isToday}">${date}</td>`;
      date++;
    }
  }
  calendar += "</tr>";
}
document.getElementById("calendarBody").innerHTML = calendar;

function toggleMode() {
  document.body.classList.toggle("dark");
}
</script>

</body>
</html>
