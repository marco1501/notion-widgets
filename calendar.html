<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Poppins:wght@400;700&family=Montserrat:wght@400;700&family=Playfair+Display:wght@400;700&family=Roboto:wght@400;700&family=Oswald:wght@400;700&family=Lobster&family=Pacifico&family=Orbitron:wght@400;700&family=Raleway:wght@400;700&family=Ubuntu:wght@400;700&family=Quicksand:wght@400;700&family=Bebas+Neue&family=Caveat:wght@400;700&family=Anton&family=Permanent+Marker&family=Press+Start+2P&family=Fredoka:wght@400;700&display=swap');

:root {
  --header-color: #8EA39D;
  --today-color: #000000;
  --calendar-bg: #f7f7f7;
  --calendar-opacity: 1;
  --hover-color: rgba(0,0,0,0.05);
  --font-family: 'Inter', sans-serif;
  --font-size: 14px;
  --font-weight: 400;
}

body {
  margin: 0;
  font-family: var(--font-family);
  font-size: var(--font-size);
  font-weight: var(--font-weight);
  background: #ffffff;
  color: #111;
  transition: 0.25s ease;
}

body.dark {
  background: #191919;
  color: #f5f5f5;
}

.container {
  max-width: 340px;
  margin: auto;
  border-radius: 14px;
  overflow: hidden;
  background: var(--calendar-bg);
  transition: 0.25s ease;
}

.header {
  background: var(--header-color);
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
}

.nav {
  cursor: pointer;
}

.card {
  padding: 12px;
  background: var(--calendar-bg);
  opacity: var(--calendar-opacity);
  transition: 0.3s ease;
}

table {
  width: 100%;
  border-collapse: collapse;
  transition: 0.3s ease;
}

th {
  padding-bottom: 6px;
  font-weight: 500;
}

td {
  height: 36px;
  text-align: center;
  border-radius: 8px;
  transition: background 0.25s, transform 0.3s ease;
}

td:hover {
  background: var(--hover-color);
}

.today {
  background: var(--today-color);
  color: white;
}

.controls {
  display: flex;
  align-items: center;
  margin-top: 10px;
}

#settingsBtn {
  background: transparent;
  border: none;
  font-size: 18px;
  cursor: pointer;
}

.credits {
  font-size: 11px;
  margin-left: 8px;
  opacity: 0.6;
}

/* SETTINGS PANEL */
#settingsPanel {
  position: absolute;
  left: 10px;
  top: 50px;
  background: white;
  padding: 14px;
  border-radius: 12px;
  width: 270px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
  display: none;
  z-index: 100;
}

body.dark #settingsPanel {
  background: #2a2a2a;
  color: white;
}

#settingsPanel label {
  font-size: 12px;
  display: block;
  margin-top: 10px;
}

#settingsPanel input,
#settingsPanel select {
  width: 100%;
  margin-top: 4px;
}

/* TOGGLE */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 12px;
}

.switch {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  inset: 0;
  background-color: #ccc;
  transition: .25s;
  border-radius: 20px;
}

.slider:before {
  content: "";
  position: absolute;
  height: 14px;
  width: 14px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .25s;
  border-radius: 50%;
}

.switch input:checked + .slider {
  background-color: var(--header-color);
}

.switch input:checked + .slider:before {
  transform: translateX(16px);
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <span class="nav" onclick="changeMonth(-1)">←</span>
    <span id="monthLabel"></span>
    <span class="nav" onclick="changeMonth(1)">→</span>
  </div>

  <div class="card">
    <table id="calendar"></table>

    <div class="controls">
      <button id="settingsBtn" onclick="toggleSettings()">⚙️</button>
      <span class="credits">Made by Marco Förster</span>
    </div>

    <div id="settingsPanel">

      <label>Modus</label>
      <select id="modeSelect">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>

      <label>Header Farbe</label>
      <input type="color" id="headerColor">

      <label>Heute Farbe</label>
      <input type="color" id="todayColor">

      <label>Kalender Hintergrund</label>
      <input type="color" id="calendarColor">

      <label>Hover Farbe</label>
      <input type="color" id="hoverColor">

      <label>Transparenz</label>
      <input type="range" id="calendarOpacity" min="0.3" max="1" step="0.05">

      <label>Schriftart</label>
      <select id="fontSelect">
        <option value="'Inter', sans-serif">Inter</option>
        <option value="'Poppins', sans-serif">Poppins</option>
        <option value="'Montserrat', sans-serif">Montserrat</option>
        <option value="'Roboto', sans-serif">Roboto</option>
        <option value="'Oswald', sans-serif">Oswald</option>
        <option value="'Raleway', sans-serif">Raleway</option>
        <option value="'Ubuntu', sans-serif">Ubuntu</option>
        <option value="'Quicksand', sans-serif">Quicksand</option>
        <option value="'Playfair Display', serif">Playfair</option>
        <option value="'Georgia', serif">Georgia</option>
        <option value="'Times New Roman', serif">Times</option>
        <option value="'Bebas Neue', cursive">Bebas Neue</option>
        <option value="'Lobster', cursive">Lobster</option>
        <option value="'Pacifico', cursive">Pacifico</option>
        <option value="'Caveat', cursive">Caveat</option>
        <option value="'Permanent Marker', cursive">Permanent Marker</option>
        <option value="'Anton', sans-serif">Anton</option>
        <option value="'Orbitron', sans-serif">Orbitron</option>
        <option value="'Press Start 2P', cursive">Pixel Retro</option>
        <option value="'Fredoka', sans-serif">Fredoka</option>
      </select>

      <label>Schriftgröße</label>
      <input type="range" id="fontSize" min="12" max="22">

      <div class="toggle-row">
        <label for="boldToggle">Fett</label>
        <label class="switch">
          <input type="checkbox" id="boldToggle">
          <span class="slider"></span>
        </label>
      </div>

    </div>
  </div>
</div>

<script>
let currentDate = new Date();
let animating = false;

function toggleSettings(){
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// Apply live
const controls = ['modeSelect','headerColor','todayColor','calendarColor','hoverColor','calendarOpacity','fontSelect','fontSize','boldToggle'];
controls.forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener('input', applySettings);
});

function applySettings(){
  const mode = document.getElementById("modeSelect").value;
  const headerColor = document.getElementById("headerColor").value;
  const todayColor = document.getElementById("todayColor").value;
  const calendarColor = document.getElementById("calendarColor").value;
  const hoverColor = document.getElementById("hoverColor").value;
  const opacity = document.getElementById("calendarOpacity").value;
  const font = document.getElementById("fontSelect").value;
  const size = document.getElementById("fontSize").value + "px";
  const weight = document.getElementById("boldToggle").checked ? "700" : "400";

  document.body.classList.toggle("dark", mode === "dark");
  document.documentElement.style.setProperty("--header-color", headerColor);
  document.documentElement.style.setProperty("--today-color", todayColor);
  document.documentElement.style.setProperty("--calendar-bg", calendarColor);
  document.documentElement.style.setProperty("--hover-color", hoverColor);
  document.documentElement.style.setProperty("--calendar-opacity", opacity);
  document.documentElement.style.setProperty("--font-family", font);
  document.documentElement.style.setProperty("--font-size", size);
  document.documentElement.style.setProperty("--font-weight", weight);

  localStorage.setItem("mode", mode);
  localStorage.setItem("headerColor", headerColor);
  localStorage.setItem("todayColor", todayColor);
  localStorage.setItem("calendarColor", calendarColor);
  localStorage.setItem("hoverColor", hoverColor);
  localStorage.setItem("calendarOpacity", opacity);
  localStorage.setItem("font", font);
  localStorage.setItem("fontSize", size);
  localStorage.setItem("fontWeight", weight);
}

// Load settings and auto dark mode detection
function loadSettings(){
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const mode = localStorage.getItem("mode") || (prefersDark ? "dark" : "light");
  document.body.classList.toggle("dark", mode === "dark");

  const map = {
    headerColor: "--header-color",
    todayColor: "--today-color",
    calendarColor: "--calendar-bg",
    hoverColor: "--hover-color",
    calendarOpacity: "--calendar-opacity",
    font: "--font-family",
    fontSize: "--font-size",
    fontWeight: "--font-weight"
  };

  for (let key in map) {
    const value = localStorage.getItem(key);
    if (value) document.documentElement.style.setProperty(map[key], value);
  }

  // Update controls
  document.getElementById("modeSelect").value = mode;
  document.getElementById("headerColor").value = localStorage.getItem("headerColor") || "#8EA39D";
  document.getElementById("todayColor").value = localStorage.getItem("todayColor") || "#000000";
  document.getElementById("calendarColor").value = localStorage.getItem("calendarColor") || "#f7f7f7";
  document.getElementById("hoverColor").value = localStorage.getItem("hoverColor") || "rgba(0,0,0,0.05)";
  document.getElementById("calendarOpacity").value = localStorage.getItem("calendarOpacity") || "1";
  document.getElementById("fontSelect").value = localStorage.getItem("font") || "'Inter', sans-serif";
  document.getElementById("fontSize").value = parseInt(localStorage.getItem("fontSize")) || 14;
  document.getElementById("boldToggle").checked = (localStorage.getItem("fontWeight") || "400") === "700";
}

// Calendar render with animation
function renderCalendar(direction=0){
  if(animating) return;
  animating = true;
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = new Date();

  const tableEl = document.getElementById("calendar");
  tableEl.style.transform = `translateX(${direction*100}%)`;
  tableEl.style.opacity = 0;

  setTimeout(()=>{
    document.getElementById("monthLabel").innerText =
      currentDate.toLocaleString("de-DE", { month: "long", year: "numeric" });

    const firstDay = new Date(year, month, 1);
    const lastDate = new Date(year, month + 1, 0).getDate();
    let startDay = (firstDay.getDay() + 6) % 7;
    let table = "<tr><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th></tr>";
    let date = 1;

    for (let i=0;i<6;i++){
      table+="<tr>";
      for(let j=0;j<7;j++){
        if(i===0 && j<startDay){ table+="<td></td>"; }
        else if(date>lastDate){ table+="<td></td>"; }
        else{
          const isToday = date===today.getDate() && month===today.getMonth() && year===today.getFullYear() ? "today":"";
          table+=`<td class="${isToday}">${date}</td>`;
          date++;
        }
      }
      table+="</tr>";
    }

    tableEl.innerHTML = table;
    tableEl.style.transform = `translateX(${-direction*100}%)`;
    tableEl.style.opacity = 1;
    animating = false;
  }, 100);
}

function changeMonth(step){
  currentDate.setMonth(currentDate.getMonth()+step);
  renderCalendar(step);
}

window.onload = ()=>{
  loadSettings();
  renderCalendar();
};
</script>

</body>
</html>
