<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --bg-light: #ffffff;
  --bg-dark: #191919;
  --text-light: #111;
  --text-dark: #f5f5f5;
  --muted-light: #666;
  --muted-dark: #aaa;
  --header: #8EA39D; /* Standard Header Farbe */
  --today: black; /* Standard Heute Farbe */
  --card-light: #f7f7f7;
  --card-dark: #2a2a2a;
  --icon-color: #888;
}

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
  background: var(--bg-light);
  color: var(--text-light);
  transition: .25s ease;
}

body.dark {
  background: var(--bg-dark);
  color: var(--text-dark);
}

.container {
  max-width: 320px;
  margin: auto;
  border-radius: 14px;
  overflow: hidden;
  background: var(--card-light);
  transition: .25s ease;
}

body.dark .container {
  background: var(--card-dark);
}

.header {
  background: var(--header);
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
}

.nav {
  cursor: pointer;
  font-size: 14px;
  opacity: 0.9;
}

.card {
  padding: 12px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}

th {
  color: var(--muted-light);
  font-weight: 500;
  padding-bottom: 6px;
}

body.dark th {
  color: var(--muted-dark);
}

td {
  height: 34px;
  text-align: center;
  border-radius: 8px;
  transition: 0.15s;
}

td:hover {
  background: rgba(0,0,0,0.05);
}

body.dark td:hover {
  background: rgba(255,255,255,0.08);
}

.today {
  background: var(--today);
  color: white;
}

.controls {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  margin-top: 10px;
  font-size: 14px;
}

.credits {
  font-size: 11px;
  color: var(--muted-light);
  margin-left: 8px;
}

body.dark .credits {
  color: var(--muted-dark);
}

/* Zahnrad */
button#settingsBtn {
  background: transparent;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--icon-color);
}

/* Einstellungen Panel */
#settingsPanel {
  position: absolute;
  right: 10px;
  top: 50px;
  background: var(--card-light);
  border-radius: 8px;
  padding: 10px;
  display: none;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 10;
  width: 220px;
}

body.dark #settingsPanel {
  background: var(--card-dark);
  color: var(--text-dark);
}

#settingsPanel label {
  display: block;
  margin: 6px 0 2px;
  font-size: 12px;
}

#settingsPanel input[type="color"],
#settingsPanel select {
  width: 100%;
  padding: 4px;
  margin-bottom: 6px;
  box-sizing: border-box;
}

#settingsPanel button {
  width: 100%;
  padding: 6px;
  cursor: pointer;
  border: none;
  border-radius: 4px;
  background: var(--header);
  color: white;
  font-weight: 600;
}
</style>
</head>

<body>

<div class="container">
  <div class="header">
    <span class="nav" onclick="changeMonth(-1)">←</span>
    <span id="monthLabel"></span>
    <span class="nav" onclick="changeMonth(1)">→</span>
  </div>

  <div class="card">
    <table id="calendar"></table>

    <div class="controls">
      <button id="settingsBtn" onclick="toggleSettings()">⚙️</button>
      <span class="credits">Made by Marco Förster</span>
    </div>

    <!-- Settings Panel -->
    <div id="settingsPanel">
      <label for="modeSelect">Modus:</label>
      <select id="modeSelect">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
      </select>

      <label for="headerColor">Monats-Header Farbe (HEX):</label>
      <input type="color" id="headerColor" value="#8EA39D">

      <label for="todayColor">Heute-Farbe (HEX):</label>
      <input type="color" id="todayColor" value="#000000">

      <button onclick="applySettings()">Anwenden</button>
    </div>
  </div>
</div>

<script>
let currentDate = new Date();

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  const today = new Date();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleString("de-DE", { month: "long", year: "numeric" });

  const firstDay = new Date(year, month, 1);
  const lastDate = new Date(year, month + 1, 0).getDate();
  let startDay = (firstDay.getDay() + 6) % 7;

  let table = "<tr><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th></tr>";
  let date = 1;

  for (let i = 0; i < 6; i++) {
    table += "<tr>";
    for (let j = 0; j < 7; j++) {
      if (i === 0 && j < startDay) {
        table += "<td></td>";
      } else if (date > lastDate) {
        table += "<td></td>";
      } else {
        const isToday =
          date === today.getDate() &&
          month === today.getMonth() &&
          year === today.getFullYear()
            ? "today"
            : "";
        table += `<td class="${isToday}">${date}</td>`;
        date++;
      }
    }
    table += "</tr>";
  }

  document.getElementById("calendar").innerHTML = table;
  setTimeout(() => {
    parent.postMessage({ type: "resize", height: document.body.scrollHeight }, "*");
  }, 100);
}

function changeMonth(step) {
  currentDate.setMonth(currentDate.getMonth() + step);
  renderCalendar();
}

// Settings Panel
function toggleSettings() {
  const panel = document.getElementById("settingsPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
}

// Apply Settings
function applySettings() {
  const mode = document.getElementById("modeSelect").value;
  const headerColor = document.getElementById("headerColor").value;
  const todayColor = document.getElementById("todayColor").value;

  // Mode
  document.body.classList.toggle("dark", mode === "dark");

  // Header Farbe
  document.querySelector(".header").style.background = headerColor;

  // Heute Farbe
  document.documentElement.style.setProperty("--today", todayColor);

  // Close panel
  document.getElementById("settingsPanel").style.display = "none";
}

renderCalendar();
</script>

</body>
</html>
