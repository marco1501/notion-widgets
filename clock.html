<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&family=Inter:wght@400;700&family=Bebas+Neue&family=Courier+Prime&family=Orbitron:wght@400;700&family=Playfair+Display&family=Oswald&family=Rubik+Mono+One&family=Montserrat:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-color: #333333;
            --text-color: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --clock-scale: 1;
            --font-family: 'Inter', sans-serif;
            --font-weight: 700;
        }

        body {
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: flex-start;
            width: 100%; height: 100vh;
            font-family: 'Inter', sans-serif;
            overflow: hidden; position: relative;
        }

        .widget-wrapper {
            width: 100%; height: 100%;
            display: flex; justify-content: center;
            padding-top: 40px; position: relative;
        }

        .clock-container {
            display: flex; gap: 15px; cursor: pointer; z-index: 5;
            transform: scale(var(--clock-scale));
            transform-origin: top center; transition: transform 0.3s ease;
        }

        .flip-card {
            background-color: var(--card-color);
            color: var(--text-color);
            width: 150px; height: 200px;
            border-radius: 18px;
            display: flex; justify-content: center; align-items: center;
            font-size: 110px;
            font-family: var(--font-family);
            font-weight: var(--font-weight);
            position: relative;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .flip-card::after {
            content: ''; position: absolute; width: 100%; height: 2px;
            background: rgba(0,0,0,0.2); top: 50%;
        }

        /* Full Width Panel */
        #settings-panel {
            position: fixed; top: 0; right: -100%;
            width: 100%; height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            color: #000; z-index: 100;
            display: flex; flex-direction: column;
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #settings-panel.active { right: 0; }

        .settings-content {
            flex: 1; overflow-y: auto; padding: 40px 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        .settings-content::-webkit-scrollbar { display: none; }

        h2 { margin-bottom: 30px; font-weight: 700; font-size: 22px; letter-spacing: 1px; }

        .setting-item {
            width: 100%; max-width: 300px;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; font-size: 14px;
        }

        select {
            padding: 5px; border-radius: 5px; border: 1px solid #ccc; font-family: inherit;
        }

        input[type="range"] { width: 80px; accent-color: #000; }

        .color-circle-input {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer; overflow: hidden;
        }

        .color-circle-input input[type="color"] {
            opacity: 0; width: 100%; height: 100%; cursor: pointer; transform: scale(3);
        }

        .btn-group {
            width: 100%; max-width: 300px;
            display: flex; flex-direction: column; gap: 10px; margin-top: 20px;
        }

        button {
            border: none; padding: 12px; border-radius: 10px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }

        .close-btn { background: #000; color: #fff; }
        .reset-btn { background: rgba(0,0,0,0.05); color: #666; }

        /* Toggle */
        .switch { position: relative; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ddd; transition: .3s; border-radius: 34px;
        }
        .slider-toggle:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 2px; bottom: 2px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider-toggle { background-color: #000; }
        input:checked + .slider-toggle:before { transform: translateX(18px); }

        .footer { padding: 20px; font-size: 11px; color: #888; text-align: center; }
    </style>
</head>
<body>

    <div class="widget-wrapper">
        <div class="clock-container" onclick="toggleSettings()">
            <div class="flip-card" id="hours">00</div>
            <div class="flip-card" id="minutes">00</div>
        </div>
    </div>

    <div id="settings-panel">
        <div class="settings-content">
            <h2>DESIGN</h2>
            
            <div class="setting-item">
                <span>Schriftart</span>
                <select id="fontSelect" onchange="updateFont(this.value)">
                    <option value="'Inter', sans-serif">Standard</option>
                    <option value="'Roboto Mono', monospace">Mono</option>
                    <option value="'Bebas Neue', cursive">Bebas</option>
                    <option value="'Orbitron', sans-serif">Digital</option>
                    <option value="'Courier Prime', monospace">Typewriter</option>
                    <option value="'Playfair Display', serif">Elegant</option>
                    <option value="'Oswald', sans-serif">Modern</option>
                    <option value="'Rubik Mono One', sans-serif">Block</option>
                    <option value="'Montserrat', sans-serif">Montserrat</option>
                    <option value="'JetBrains Mono', monospace">Coder</option>
                </select>
            </div>

            <div class="setting-item">
                <span>Fett (Bold)</span>
                <label class="switch">
                    <input type="checkbox" id="boldToggle" checked onchange="updateWeight()">
                    <span class="slider-toggle"></span>
                </label>
            </div>

            <div class="setting-item">
                <span>Größe</span>
                <input type="range" id="sizeSlider" min="0.3" max="1.5" step="0.05" value="1.0" oninput="updateSize(this.value)">
            </div>

            <div class="setting-item">
                <span>Uhr</span>
                <div class="color-circle-input" id="circle-card">
                    <input type="color" id="input-card" oninput="updateTheme('card', this.value)">
                </div>
            </div>

            <div class="setting-item">
                <span>Zahl</span>
                <div class="color-circle-input" id="circle-text">
                    <input type="color" id="input-text" oninput="updateTheme('text', this.value)">
                </div>
            </div>

            <div class="setting-item">
                <span>Farbe</span>
                <div class="color-circle-input" id="circle-bg">
                    <input type="color" id="input-bg" oninput="updateTheme('bg', this.value)">
                </div>
            </div>

            <div class="setting-item">
                <span>24h</span>
                <label class="switch">
                    <input type="checkbox" id="formatToggle" checked onchange="saveFormat()">
                    <span class="slider-toggle"></span>
                </label>
            </div>

            <div class="btn-group">
                <button class="close-btn" onclick="toggleSettings()">Schließen</button>
                <button class="reset-btn" onclick="resetDefaults()">Reset</button>
            </div>
        </div>
        
        <div class="footer">made by <b>Marco Förster</b></div>
    </div>

    <script>
        const defaults = { card: '#333333', text: '#ffffff', bg: '#f0f0f0', format24: true, size: 1.0, font: "'Inter', sans-serif", bold: true };

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            if (!document.getElementById('formatToggle').checked) h = h % 12 || 12;
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('active');
        }

        function updateFont(val) {
            document.documentElement.style.setProperty('--font-family', val);
            localStorage.setItem('clockFont', val);
        }

        function updateWeight() {
            const isBold = document.getElementById('boldToggle').checked;
            document.documentElement.style.setProperty('--font-weight', isBold ? '700' : '400');
            localStorage.setItem('clockBold', isBold);
        }

        function updateSize(val) {
            document.documentElement.style.setProperty('--clock-scale', val);
            localStorage.setItem('clockSize', val);
        }

        function updateTheme(type, color) {
            document.documentElement.style.setProperty(`--${type === 'bg' ? 'bg' : (type === 'card' ? 'card' : 'text')}-color`, color);
            document.getElementById(`circle-${type}`).style.backgroundColor = color;
            localStorage.setItem(`${type}Color`, color);
        }

        function saveFormat() {
            localStorage.setItem('format24', document.getElementById('formatToggle').checked);
            updateClock();
        }

        function resetDefaults() {
            updateTheme('card', defaults.card); updateTheme('text', defaults.text); updateTheme('bg', defaults.bg);
            updateSize(defaults.size); updateFont(defaults.font);
            document.getElementById('fontSelect').value = defaults.font;
            document.getElementById('boldToggle').checked = defaults.bold;
            updateWeight();
            document.getElementById('sizeSlider').value = defaults.size;
            document.getElementById('formatToggle').checked = defaults.format24;
            saveFormat();
        }

        window.onload = () => {
            const savedFont = localStorage.getItem('clockFont') || defaults.font;
            const savedBold = localStorage.getItem('clockBold') === null ? defaults.bold : localStorage.getItem('clockBold') === 'true';
            updateFont(savedFont); document.getElementById('fontSelect').value = savedFont;
            document.getElementById('boldToggle').checked = savedBold; updateWeight();
            
            updateTheme('card', localStorage.getItem('cardColor') || defaults.card);
            updateTheme('text', localStorage.getItem('textColor') || defaults.text);
            updateTheme('bg', localStorage.getItem('bgColor') || defaults.bg);
            updateSize(localStorage.getItem('clockSize') || defaults.size);
            document.getElementById('sizeSlider').value = localStorage.getItem('clockSize') || defaults.size;
            document.getElementById('formatToggle').checked = localStorage.getItem('format24') === null ? defaults.format24 : localStorage.getItem('format24') === 'true';

            updateClock(); setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
