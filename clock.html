<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-color: #333333;
            --text-color: #ffffff;
            --panel-bg: #ffffff;
        }

        /* Das Widget-Quadrat */
        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 500px; 
            height: 500px;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden; /* Verhindert Scrollen */
            position: relative;
        }

        /* Uhr-Bereich */
        .clock-container {
            display: flex;
            gap: 15px;
            cursor: pointer;
            z-index: 5;
        }

        .flip-card {
            background-color: var(--card-color);
            color: var(--text-color);
            width: 150px;
            height: 200px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 110px;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
        }

        .flip-card::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.3);
            top: 50%;
        }

        /* Einstellungs-Panel: Jetzt mit display: none */
        #settings-panel {
            display: none; /* Komplett weg, wenn nicht aktiv */
            position: absolute;
            top: 0;
            left: 0;
            width: 500px;
            height: 500px;
            background: var(--panel-bg);
            color: #000;
            padding: 40px;
            box-sizing: border-box;
            z-index: 100; /* Liegt über der Uhr */
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.3s ease-out; /* Kurzes Einblenden */
        }

        /* Wenn aktiv, dann als Flexbox anzeigen */
        #settings-panel.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { margin: 0 0 30px 0; font-weight: 600; font-size: 24px; }

        .setting-item {
            width: 100%;
            max-width: 300px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 17px;
        }

        .color-circle-input {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #eee;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .color-circle-input input[type="color"] {
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transform: scale(3);
        }

        .btn-group {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: "Segoe UI";
        }

        .close-btn { background: #000; color: #fff; }
        .reset-btn { background: #f0f0f0; color: #666; }

        /* Modern Toggle */
        .switch {
            position: relative;
            width: 48px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #eee;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #000; }
        input:checked + .slider:before { transform: translateX(24px); }

        .footer {
            margin-top: auto;
            font-size: 13px;
            color: #bbb;
        }
        .footer a { color: #999; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="clock-container" onclick="toggleSettings()">
        <div class="flip-card" id="hours">00</div>
        <div class="flip-card" id="minutes">00</div>
    </div>

    <div id="settings-panel">
        <h2>Design</h2>
        
        <div class="setting-item">
            <span>Uhrfarbe</span>
            <div class="color-circle-input" id="circle-card">
                <input type="color" id="input-card" oninput="updateTheme('card', this.value)">
            </div>
        </div>

        <div class="setting-item">
            <span>Zahlenfarbe</span>
            <div class="color-circle-input" id="circle-text">
                <input type="color" id="input-text" oninput="updateTheme('text', this.value)">
            </div>
        </div>

        <div class="setting-item">
            <span>Außenfarbe</span>
            <div class="color-circle-input" id="circle-bg">
                <input type="color" id="input-bg" oninput="updateTheme('bg', this.value)">
            </div>
        </div>

        <div class="setting-item">
            <span>24h Format</span>
            <label class="switch">
                <input type="checkbox" id="formatToggle" checked onchange="saveFormat()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="btn-group">
            <button class="close-btn" onclick="toggleSettings()">Schließen</button>
            <button class="reset-btn" onclick="resetDefaults()">Reset</button>
        </div>
        
        <div class="footer">
            made by <a href="https://www.marcofoerster.com" target="_blank">Marco Förster</a>
        </div>
    </div>

    <script>
        const defaults = {
            card: '#333333',
            text: '#ffffff',
            bg: '#f0f0f0',
            format24: true
        };

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            const is24h = document.getElementById('formatToggle').checked;
            if (!is24h) h = h % 12 || 12;
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        }

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            panel.classList.toggle('active');
        }

        function updateTheme(type, color) {
            if(type === 'card') {
                document.documentElement.style.setProperty('--card-color', color);
                document.getElementById('circle-card').style.backgroundColor = color;
                localStorage.setItem('cardColor', color);
            }
            if(type === 'text') {
                document.documentElement.style.setProperty('--text-color', color);
                document.getElementById('circle-text').style.backgroundColor = color;
                localStorage.setItem('textColor', color);
            }
            if(type === 'bg') {
                document.documentElement.style.setProperty('--bg-color', color);
                document.getElementById('circle-bg').style.backgroundColor = color;
                localStorage.setItem('bgColor', color);
            }
        }

        function saveFormat() {
            localStorage.setItem('format24', document.getElementById('formatToggle').checked);
            updateClock();
        }

        function resetDefaults() {
            updateTheme('card', defaults.card);
            updateTheme('text', defaults.text);
            updateTheme('bg', defaults.bg);
            document.getElementById('formatToggle').checked = defaults.format24;
            saveFormat();
            document.getElementById('input-card').value = defaults.card;
            document.getElementById('input-text').value = defaults.text;
            document.getElementById('input-bg').value = defaults.bg;
        }

        window.onload = () => {
            const savedCard = localStorage.getItem('cardColor') || defaults.card;
            const savedText = localStorage.getItem('textColor') || defaults.text;
            const savedBg = localStorage.getItem('bgColor') || defaults.bg;
            const savedFormat = localStorage.getItem('format24') === null ? defaults.format24 : localStorage.getItem('format24') === 'true';

            updateTheme('card', savedCard);
            updateTheme('text', savedText);
            updateTheme('bg', savedBg);
            document.getElementById('input-card').value = savedCard;
            document.getElementById('input-text').value = savedText;
            document.getElementById('input-bg').value = savedBg;
            document.getElementById('formatToggle').checked = savedFormat;
            
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
