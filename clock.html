<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-color: #333333;
            --text-color: #ffffff;
            --panel-bg: #ffffff;
        }

        /* Quadratisches Widget-Format */
        body {
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 500px; /* Quadratische Breite */
            height: 500px; /* Quadratische Höhe */
            font-family: "Segoe UI", Tahoma, sans-serif;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .clock-container {
            display: flex;
            gap: 12px;
            cursor: pointer;
            z-index: 1;
        }

        .flip-card {
            background-color: var(--card-color);
            color: var(--text-color);
            width: 140px;
            height: 180px;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 100px;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .flip-card::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.3);
            top: 50%;
        }

        /* Quadratische Einstellungen */
        #settings-panel {
            position: absolute;
            bottom: -100%;
            left: 0;
            width: 100%;
            height: 100%; /* Füllt das Quadrat beim Öffnen */
            background: var(--panel-bg);
            color: #000;
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 40px 30px;
            box-sizing: border-box;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #settings-panel.active { bottom: 0; }

        .setting-item {
            width: 100%;
            max-width: 320px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .color-circle-input {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid #ddd;
            cursor: pointer;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }
        
        .color-circle-input:hover { transform: scale(1.1); }

        .color-circle-input input[type="color"] {
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            transform: scale(3);
        }

        .btn-group {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 15px;
        }

        .close-btn, .reset-btn {
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: "Segoe UI";
        }

        .close-btn { background: #000; color: #fff; }
        .reset-btn { background: #f4f4f4; color: #666; }

        .switch {
            position: relative;
            width: 46px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #eee;
            transition: .3s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #000; }
        input:checked + .slider:before { transform: translateX(24px); }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #bbb;
        }
        .footer a { color: #999; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="clock-container" id="clock" onclick="toggleSettings()">
        <div class="flip-card" id="hours">00</div>
        <div class="flip-card" id="minutes">00</div>
    </div>

    <div id="settings-panel">
        <h2 style="margin-top: 0; font-weight: 600;">Widget Setup</h2>
        
        <div class="setting-item">
            <span>Uhrfarbe</span>
            <div class="color-circle-input" id="circle-card">
                <input type="color" id="input-card" oninput="updateTheme('card', this.value)">
            </div>
        </div>

        <div class="setting-item">
            <span>Zahlenfarbe</span>
            <div class="color-circle-input" id="circle-text">
                <input type="color" id="input-text" oninput="updateTheme('text', this.value)">
            </div>
        </div>

        <div class="setting-item">
            <span>Außenfarbe</span>
            <div class="color-circle-input" id="circle-bg">
                <input type="color" id="input-bg" oninput="updateTheme('bg', this.value)">
            </div>
        </div>

        <div class="setting-item">
            <span>24h Format</span>
            <label class="switch">
                <input type="checkbox" id="formatToggle" checked onchange="saveFormat()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="btn-group">
            <button class="close-btn" onclick="toggleSettings()">Einstellungen schließen</button>
            <button class="reset-btn" onclick="resetDefaults()">Reset auf Werkseinstellungen</button>
        </div>
        
        <div class="footer">
            made by <a href="https://www.marcofoerster.com" target="_blank">Marco Förster</a>
        </div>
    </div>

    <script>
        const defaults = {
            card: '#333333',
            text: '#ffffff',
            bg: '#f0f0f0',
            format24: true
        };

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            const is24h = document.getElementById('formatToggle').checked;
            if (!is24h) h = h % 12 || 12;
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('active');
        }

        function updateTheme(type, color) {
            if(type === 'card') {
                document.documentElement.style.setProperty('--card-color', color);
                document.getElementById('circle-card').style.backgroundColor = color;
                localStorage.setItem('cardColor', color);
            }
            if(type === 'text') {
                document.documentElement.style.setProperty('--text-color', color);
                document.getElementById('circle-text').style.backgroundColor = color;
                localStorage.setItem('textColor', color);
            }
            if(type === 'bg') {
                document.documentElement.style.setProperty('--bg-color', color);
                document.getElementById('circle-bg').style.backgroundColor = color;
                localStorage.setItem('bgColor', color);
            }
        }

        function saveFormat() {
            localStorage.setItem('format24', document.getElementById('formatToggle').checked);
            updateClock();
        }

        function resetDefaults() {
            updateTheme('card', defaults.card);
            updateTheme('text', defaults.text);
            updateTheme('bg', defaults.bg);
            document.getElementById('formatToggle').checked = defaults.format24;
            saveFormat();
            document.getElementById('input-card').value = defaults.card;
            document.getElementById('input-text').value = defaults.text;
            document.getElementById('input-bg').value = defaults.bg;
        }

        window.onload = () => {
            const savedCard = localStorage.getItem('cardColor') || defaults.card;
            const savedText = localStorage.getItem('textColor') || defaults.text;
            const savedBg = localStorage.getItem('bgColor') || defaults.bg;
            const savedFormat = localStorage.getItem('format24') === null ? defaults.format24 : localStorage.getItem('format24') === 'true';

            updateTheme('card', savedCard);
            updateTheme('text', savedText);
            updateTheme('bg', savedBg);
            document.getElementById('input-card').value = savedCard;
            document.getElementById('input-text').value = savedText;
            document.getElementById('input-bg').value = savedBg;
            document.getElementById('formatToggle').checked = savedFormat;
            
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
