<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-color: #f0f0f0;
            --card-color: #333333;
            --text-color: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --clock-scale: 1;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            height: 100vh;
            font-family: "Segoe UI", sans-serif;
            overflow: hidden;
            position: relative;
        }

        .widget-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            position: relative;
        }

        .clock-container {
            display: flex;
            gap: 15px;
            cursor: pointer;
            z-index: 5;
            transform: scale(var(--clock-scale));
            transform-origin: top center;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flip-card {
            background-color: var(--card-color);
            color: var(--text-color);
            width: 150px;
            height: 200px;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 110px;
            font-weight: 700;
            position: relative;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
        }

        .flip-card::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0,0,0,0.2);
            top: 50%;
        }

        /* Einstellungs-Panel mit Scroll-Funktion */
        #settings-panel {
            position: fixed;
            top: 0;
            right: -50%;
            width: 50%;
            height: 100%;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            color: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
            transition: right 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 1px solid rgba(255,255,255,0.3);
        }

        #settings-panel.active { right: 0; }

        /* Scrollbarer Bereich im Menü */
        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.2) transparent;
        }

        /* Custom Scrollbar für Chrome/Safari */
        .settings-content::-webkit-scrollbar { width: 4px; }
        .settings-content::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }

        h2 { margin: 0 0 30px 0; font-weight: 600; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }

        .setting-item {
            width: 100%;
            max-width: 240px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
            font-weight: 500;
            flex-shrink: 0; /* Verhindert Stauchen beim Scrollen */
        }

        input[type="range"] { width: 80px; accent-color: #000; }

        .color-circle-input {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            cursor: pointer;
            overflow: hidden;
            background-color: var(--card-color);
        }

        .color-circle-input input[type="color"] {
            opacity: 0; width: 100%; height: 100%; cursor: pointer; transform: scale(3);
        }

        .btn-group {
            width: 100%;
            max-width: 240px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
            padding-bottom: 30px; /* Platz nach unten */
        }

        button {
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            font-family: "Segoe UI";
        }

        .close-btn { background: #000; color: #fff; }
        .reset-btn { background: rgba(0,0,0,0.05); color: #666; }

        /* Modern Toggle */
        .switch { position: relative; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider-toggle {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ddd; transition: .3s; border-radius: 34px;
        }
        .slider-toggle:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider-toggle { background-color: #000; }
        input:checked + .slider-toggle:before { transform: translateX(20px); }

        .footer {
            padding: 20px 0;
            font-size: 11px;
            color: #888;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.05);
        }
        .footer a { color: #000; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="widget-wrapper">
        <div class="clock-container" onclick="toggleSettings()">
            <div class="flip-card" id="hours">00</div>
            <div class="flip-card" id="minutes">00</div>
        </div>
    </div>

    <div id="settings-panel">
        <div class="settings-content">
            <h2>Design</h2>
            
            <div class="setting-item">
                <span>Größe</span>
                <input type="range" id="sizeSlider" min="0.3" max="1.5" step="0.05" value="1.0" oninput="updateSize(this.value)">
            </div>

            <div class="setting-item">
                <span>Uhrfarbe</span>
                <div class="color-circle-input" id="circle-card">
                    <input type="color" id="input-card" oninput="updateTheme('card', this.value)">
                </div>
            </div>

            <div class="setting-item">
                <span>Zahlenfarbe</span>
                <div class="color-circle-input" id="circle-text">
                    <input type="color" id="input-text" oninput="updateTheme('text', this.value)">
                </div>
            </div>

            <div class="setting-item">
                <span>Außenfarbe</span>
                <div class="color-circle-input" id="circle-bg">
                    <input type="color" id="input-bg" oninput="updateTheme('bg', this.value)">
                </div>
            </div>

            <div class="setting-item">
                <span>24h Format</span>
                <label class="switch">
                    <input type="checkbox" id="formatToggle" checked onchange="saveFormat()">
                    <span class="slider-toggle"></span>
                </label>
            </div>

            <div class="btn-group">
                <button class="close-btn" onclick="toggleSettings()">Schließen</button>
                <button class="reset-btn" onclick="resetDefaults()">Reset</button>
            </div>
        </div>
        
        <div class="footer">
            made by <a href="https://www.marcofoerster.com" target="_blank">Marco Förster</a>
        </div>
    </div>

    <script>
        const defaults = { card: '#333333', text: '#ffffff', bg: '#f0f0f0', format24: true, size: 1.0 };

        function updateClock() {
            const now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            const is24h = document.getElementById('formatToggle').checked;
            if (!is24h) h = h % 12 || 12;
            document.getElementById('hours').innerText = h.toString().padStart(2, '0');
            document.getElementById('minutes').innerText = m.toString().padStart(2, '0');
        }

        function toggleSettings() {
            document.getElementById('settings-panel').classList.toggle('active');
        }

        function updateSize(val) {
            document.documentElement.style.setProperty('--clock-scale', val);
            localStorage.setItem('clockSize', val);
        }

        function updateTheme(type, color) {
            if(type === 'card') {
                document.documentElement.style.setProperty('--card-color', color);
                document.getElementById('circle-card').style.backgroundColor = color;
                localStorage.setItem('cardColor', color);
            }
            if(type === 'text') {
                document.documentElement.style.setProperty('--text-color', color);
                document.getElementById('circle-text').style.backgroundColor = color;
                localStorage.setItem('textColor', color);
            }
            if(type === 'bg') {
                document.documentElement.style.setProperty('--bg-color', color);
                document.getElementById('circle-bg').style.backgroundColor = color;
                localStorage.setItem('bgColor', color);
            }
        }

        function saveFormat() {
            localStorage.setItem('format24', document.getElementById('formatToggle').checked);
            updateClock();
        }

        function resetDefaults() {
            updateTheme('card', defaults.card);
            updateTheme('text', defaults.text);
            updateTheme('bg', defaults.bg);
            updateSize(defaults.size);
            document.getElementById('sizeSlider').value = defaults.size;
            document.getElementById('formatToggle').checked = defaults.format24;
            saveFormat();
            document.getElementById('input-card').value = defaults.card;
            document.getElementById('input-text').value = defaults.text;
            document.getElementById('input-bg').value = defaults.bg;
        }

        window.onload = () => {
            const savedCard = localStorage.getItem('cardColor') || defaults.card;
            const savedText = localStorage.getItem('textColor') || defaults.text;
            const savedBg = localStorage.getItem('bgColor') || defaults.bg;
            const savedSize = localStorage.getItem('clockSize') || defaults.size;
            const savedFormat = localStorage.getItem('format24') === null ? defaults.format24 : localStorage.getItem('format24') === 'true';

            updateTheme('card', savedCard);
            updateTheme('text', savedText);
            updateTheme('bg', savedBg);
            updateSize(savedSize);
            document.getElementById('sizeSlider').value = savedSize;
            document.getElementById('input-card').value = savedCard;
            document.getElementById('input-text').value = savedText;
            document.getElementById('input-bg').value = savedBg;
            document.getElementById('formatToggle').checked = savedFormat;
            
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
